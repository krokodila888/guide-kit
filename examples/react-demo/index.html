<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>guide-kit / react demo — Расчёт тормозного пути</title>

  <!--
    Import map: resolves bare specifiers 'react' / 'react-dom' to CDN.
    guide-kit/react externalized both, so all code shares one React instance.
  -->
  <script type="importmap">
  {
    "imports": {
      "react":             "https://esm.sh/react@18.3.1?dev",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
      "react-dom":         "https://esm.sh/react-dom@18.3.1?dev",
      "react-dom/client":  "https://esm.sh/react-dom@18.3.1/client?dev",
      "@floating-ui/dom":  "https://esm.sh/@floating-ui/dom@1"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      min-height: 100vh;
    }

    /* ── Page header ─────────────────────────────────────── */
    .page-header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .page-header h1 { font-size: 16px; font-weight: 600; color: #1f2937; }
    .page-header p  { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; flex-shrink: 0; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      color: #1f2937;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
    }
    .btn-secondary:hover { background: #f3f4f6; }

    /* ── Layout ──────────────────────────────────────────── */
    .page-body {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 24px;
    }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    /* ── Form ────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    input[type="number"] {
      width: 100%;
      padding: 9px 12px;
      padding-right: 44px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1f2937;
      background: #ffffff;
      transition: border-color 0.15s, box-shadow 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-wrap { position: relative; }
    .unit-badge {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #9ca3af;
      pointer-events: none;
      font-weight: 500;
    }

    /* ── Submit ──────────────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1d4ed8; }

    /* ── Result ──────────────────────────────────────────── */
    .result-box {
      margin-top: 20px;
      padding: 16px 20px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
    }
    .result-label  { font-size: 13px; color: #3b82f6; font-weight: 500; margin-bottom: 4px; }
    .result-value  { font-size: 28px; font-weight: 700; color: #1e40af; }
    .result-unit   { font-size: 15px; font-weight: 400; color: #3b82f6; margin-left: 4px; }
    .result-note   { font-size: 12px; color: #6b7280; margin-top: 6px; }

    /* ── Info banner ─────────────────────────────────────── */
    .info-banner {
      background: #fefce8;
      border: 1px solid #fde047;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      color: #713f12;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .info-banner svg { flex-shrink: 0; margin-top: 1px; }

    /* ── Formula card ────────────────────────────────────── */
    .formula-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px 28px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState } from 'react'
    import { createRoot } from 'react-dom/client'
    import htm from 'https://esm.sh/htm@3'

    import {
      Hint,
      Tour,
      SidebarOverlay,
      FormulaBlock,
      HelpPanel,
      HelpPanelProvider,
      useHelpPanel,
      useHelpRegistry,
    } from '../../dist/react.mjs'

    const html = htm.bind(React.createElement)

    // ── Shared SVG icons ───────────────────────────────────────────────────

    const IconSidebar = () => html`
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>`

    const IconTour = () => html`
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
        <line x1="4" y1="22" x2="4" y2="15"/>
      </svg>`

    const IconCalc = () => html`
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>`

    // ── MaybeHint — renders Hint only when hints are enabled ───────────────

    function MaybeHint({ enabled, content, placement, children }) {
      if (!enabled) return children
      return html`<${Hint} content=${content} placement=${placement ?? 'right'}>${children}</>`
    }

    // ── Sidebar sections definition ────────────────────────────────────────

    const sidebarSections = [
      {
        type: 'text',
        title: 'Назначение',
        content: 'Расчёт тормозного пути при экстренном торможении по методике ПТЭ 2022, приложение 2. '
               + 'Результат используется при проверке соответствия норматив­ному значению для данного типа состава.',
      },
      {
        type: 'formula',
        title: 'Расчётная формула',
        formula: {
          mode: 'html',
          html: '<i>S</i> = <i>v</i><sub>0</sub><sup>2</sup> / (254 &sdot; (<i>&phi;</i> + <i>i</i> / 1000))',
          variables: [
            { symbol: 'S',   description: 'Тормозной путь',                    unit: 'м' },
            { symbol: 'v₀',  description: 'Начальная скорость',                unit: 'км/ч' },
            { symbol: 'φ',   description: 'Расчётный тормозной коэффициент',   unit: 'б/р' },
            { symbol: 'i',   description: 'Уклон (+подъём, −спуск)',           unit: '‰' },
            { symbol: '254', description: 'Константа перевода единиц',         unit: '' },
          ],
          source: 'ПТЭ 2022, приложение 2, таблица П2.1',
        },
      },
      {
        type: 'steps',
        title: 'Порядок расчёта',
        collapsible: true,
        steps: [
          { label: 'Определить массу состава',           description: 'По перевозочным документам или взвешиванию' },
          { label: 'Установить начальную скорость',       description: 'Максимально допустимая для участка пути' },
          { label: 'Определить тормозной коэффициент',   description: 'Из тормозной документации состава' },
          { label: 'Учесть уклон пути',                  description: 'Спуск берётся со знаком «−»' },
          { label: 'Подставить значения в формулу' },
          { label: 'Сравнить с нормативом ПТЭ 2022' },
        ],
      },
      {
        type: 'checklist',
        title: 'Проверка перед расчётом',
        collapsible: true,
        items: [
          { id: 'c1', label: 'Масса состава подтверждена документально' },
          { id: 'c2', label: 'Скорость не превышает допустимую на участке' },
          { id: 'c3', label: 'Тормозной коэффициент проверен по документации' },
          { id: 'c4', label: 'Уклон взят из актуального профиля пути' },
        ],
      },
    ]

    // ── Tour steps ─────────────────────────────────────────────────────────

    const tourSteps = [
      {
        target: '#rd-group-mass',
        title: 'Шаг 1 — Масса состава',
        content: 'Введите полную массу вагонов без локомотива. '
               + 'Подсказка покажет диапазон и ссылку на норматив — включите «Подсказки» в панели помощи.',
        placement: 'bottom',
      },
      {
        target: '#rd-group-brake',
        title: 'Шаг 2 — Тормозной коэффициент',
        content: 'Ключевой параметр расчёта. '
               + 'Определяется по тормозной документации: отношение силы нажатия колодок к весу состава.',
        placement: 'bottom',
      },
      {
        target: '#rd-btn-calculate',
        title: 'Шаг 3 — Запуск расчёта',
        content: 'Нажмите, чтобы вычислить тормозной путь. '
               + 'Откройте «Методику» для просмотра полной формулы и нормативного источника.',
        placement: 'top',
      },
    ]

    // ── Hint content definitions ───────────────────────────────────────────

    const hints = {
      mass: {
        title: 'Масса состава (брутто)',
        description: 'Суммарная масса вагонов с грузом без учёта локомотива.',
        range: '100 – 10 000',
        unit: 'т',
        norm: 'ГОСТ 22235-2010',
      },
      velocity: {
        title: 'Начальная скорость',
        description: 'Скорость поезда в момент начала торможения. '
                   + 'Для экстренного торможения принимается максимальная скорость участка.',
        range: '0 – 200',
        unit: 'км/ч',
        norm: 'ПТЭ 2022, приложение 2',
      },
      brake: {
        title: 'Расчётный тормозной коэффициент',
        description: 'Отношение суммарной расчётной силы нажатия тормозных колодок к весу состава.',
        range: '0.05 – 1.0',
        unit: 'б/р',
        norm: 'ПТЭ 2022, п. 3.2',
      },
      gradient: {
        title: 'Уклон пути',
        description: 'Продольный уклон в промилле. Положительное — подъём, отрицательное — спуск. '
                   + 'Спуск увеличивает тормозной путь.',
        range: '−20 … +20',
        unit: '‰',
        norm: 'СП 119.13330.2017',
      },
    }

    // ── AppInner — uses context from HelpPanelProvider ─────────────────────

    function AppInner() {
      const { isEnabled } = useHelpPanel()

      const [tourRunning,  setTourRunning]  = useState(false)
      const [sidebarOpen,  setSidebarOpen]  = useState(false)
      const [result,       setResult]       = useState(null)

      // Register help items — tied to component lifecycle
      useHelpRegistry({
        id: 'rd-hint', type: 'hint',
        label: 'Подсказки к полям',
        description: 'Контекстные подсказки при наведении курсора',
        action: () => {},
      })
      useHelpRegistry({
        id: 'rd-tour', type: 'tour',
        label: 'Обучающий тур',
        description: 'Пошаговое знакомство с расчётом',
        action: () => setTourRunning(true),
      })
      useHelpRegistry({
        id: 'rd-sidebar', type: 'sidebar',
        label: 'Методические материалы',
        description: 'Формула, порядок расчёта, чек-лист',
        action: () => setSidebarOpen(true),
      })

      const hintsEnabled   = isEnabled('rd-hint')
      const tourEnabled    = isEnabled('rd-tour')
      const sidebarEnabled = isEnabled('rd-sidebar')

      function handleSubmit(e) {
        e.preventDefault()
        const v0       = parseFloat(e.target.velocity.value) || 0
        const phi      = parseFloat(e.target.brake.value)    || 0
        const gradient = parseFloat(e.target.gradient.value) || 0
        const eff = phi + gradient / 1000
        if (eff <= 0) { alert('Сумма тормозного коэффициента и уклона должна быть > 0.'); return }
        setResult({ s: (v0 * v0) / (254 * eff), v0, phi, gradient })
      }

      return html`
        <div>

          <!-- ── Orchestrated components ─────────────────────────────── -->

          <${Tour}
            steps=${tourSteps}
            run=${tourRunning && tourEnabled}
            onComplete=${() => setTourRunning(false)}
            onSkip=${()    => setTourRunning(false)}
            spotlightPadding=${10}
            overlayOpacity=${0.6}
          />

          <${SidebarOverlay}
            open=${sidebarOpen && sidebarEnabled}
            onClose=${() => setSidebarOpen(false)}
            onOpen=${()  => setSidebarOpen(true)}
            title="Методические материалы"
            side="left"
            width=${340}
            showToggleButton=${sidebarEnabled}
            toggleButtonLabel="Методика"
            backdrop=${false}
            sections=${sidebarSections}
          />

          <!-- HelpPanel: floating ? button — manages the three items above -->
          <${HelpPanel} position="bottom-right" />

          <!-- ── Page chrome ─────────────────────────────────────────── -->

          <header className="page-header">
            <div>
              <h1>Расчёт тормозного пути</h1>
              <p>guide-kit / react demo</p>
            </div>
            <div className="header-actions">
              <button className="btn-secondary"
                      onClick=${() => setSidebarOpen(true)}
                      disabled=${!sidebarEnabled}>
                <${IconSidebar}/> Методика
              </button>
              <button className="btn-secondary"
                      onClick=${() => setTourRunning(true)}
                      disabled=${!tourEnabled}>
                <${IconTour}/> Начать тур
              </button>
            </div>
          </header>

          <!-- ── Main content ────────────────────────────────────────── -->

          <main className="page-body">

            <div className="info-banner">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" strokeWidth="2" style=${{flexShrink:0,marginTop:'1px'}}>
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>
                Управляйте компонентами помощи через кнопку <strong>?</strong> (справа внизу).
                Включайте и выключайте подсказки, тур и методику независимо.
                ${' '}Это уникальная возможность React-версии guide-kit.
              </span>
            </div>

            <!-- ── Form card ──────────────────────────────────────── -->
            <div className="card">
              <div className="card-title">Исходные данные</div>

              <form onSubmit=${handleSubmit}>
                <div className="form-grid">

                  <div className="form-group" id="rd-group-mass">
                    <label htmlFor="rd-mass">Масса состава</label>
                    <${MaybeHint} enabled=${hintsEnabled} content=${hints.mass} placement="right">
                      <div className="input-wrap">
                        <input type="number" id="rd-mass" name="mass"
                               defaultValue="3000" min="100" max="10000" step="50"/>
                        <span className="unit-badge">т</span>
                      </div>
                    <//>
                  </div>

                  <div className="form-group" id="rd-group-velocity">
                    <label htmlFor="rd-velocity">Начальная скорость</label>
                    <${MaybeHint} enabled=${hintsEnabled} content=${hints.velocity} placement="right">
                      <div className="input-wrap">
                        <input type="number" id="rd-velocity" name="velocity"
                               defaultValue="80" min="0" max="200" step="5"/>
                        <span className="unit-badge">км/ч</span>
                      </div>
                    <//>
                  </div>

                  <div className="form-group" id="rd-group-brake">
                    <label htmlFor="rd-brake">Тормозной коэффициент</label>
                    <${MaybeHint} enabled=${hintsEnabled} content=${hints.brake} placement="right">
                      <div className="input-wrap">
                        <input type="number" id="rd-brake" name="brake"
                               defaultValue="0.33" min="0.05" max="1.0" step="0.01"/>
                        <span className="unit-badge">б/р</span>
                      </div>
                    <//>
                  </div>

                  <div className="form-group">
                    <label htmlFor="rd-gradient">Уклон пути</label>
                    <${MaybeHint} enabled=${hintsEnabled} content=${hints.gradient} placement="right">
                      <div className="input-wrap">
                        <input type="number" id="rd-gradient" name="gradient"
                               defaultValue="0" min="-20" max="20" step="1"/>
                        <span className="unit-badge">‰</span>
                      </div>
                    <//>
                  </div>

                  <div className="form-group full" style=${{marginTop:'6px'}}>
                    <button type="submit" className="btn-primary" id="rd-btn-calculate">
                      <${IconCalc}/> Рассчитать тормозной путь
                    </button>
                  </div>

                </div>

                ${result && html`
                  <div className="result-box">
                    <div className="result-label">Расчётный тормозной путь</div>
                    <div>
                      <span className="result-value">${result.s.toFixed(1)}</span>
                      <span className="result-unit">м</span>
                    </div>
                    <div className="result-note">
                      v₀ = ${result.v0} км/ч,  φ = ${result.phi},  уклон = ${result.gradient} ‰
                      — по формуле ПТЭ 2022
                    </div>
                  </div>
                `}
              </form>
            </div>

            <!-- ── Inline FormulaBlock ────────────────────────────── -->
            <div className="formula-card">
              <div className="card-title" style=${{marginBottom:'14px'}}>Расчётная формула</div>
              <${FormulaBlock}
                mode="html"
                html="<i>S</i> = <i>v</i><sub>0</sub><sup>2</sup> / (254 &sdot; (<i>&phi;</i> + <i>i</i> / 1000))"
                variables=${[
                  { symbol: 'S',   description: 'Тормозной путь',                  unit: 'м' },
                  { symbol: 'v₀',  description: 'Начальная скорость',              unit: 'км/ч' },
                  { symbol: 'φ',   description: 'Тормозной коэффициент',           unit: 'б/р' },
                  { symbol: 'i',   description: 'Уклон пути (+подъём, −спуск)',    unit: '‰' },
                ]}
                source="ПТЭ 2022, приложение 2"
              />
            </div>

          </main>
        </div>
      `
    }

    // ── App root — provides HelpPanel context ──────────────────────────────

    function App() {
      return html`
        <${HelpPanelProvider} storageKey="gk-react-demo">
          <${AppInner}/>
        <//>
      `
    }

    createRoot(document.getElementById('root')).render(html`<${App}/>`)
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>guide-kit / vue demo — Расчёт тормозного пути</title>

  <script type="importmap">
  {
    "imports": {
      "vue":               "https://unpkg.com/vue@3.4.0/dist/vue.esm-browser.js",
      "@floating-ui/dom":  "https://esm.sh/@floating-ui/dom@1"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      min-height: 100vh;
    }

    /* ── Page header ─────────────────────────────────────── */
    .page-header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .page-header h1 { font-size: 16px; font-weight: 600; color: #1f2937; }
    .page-header p  { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; flex-shrink: 0; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      color: #1f2937;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
    }
    .btn-secondary:hover { background: #f3f4f6; }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Layout ──────────────────────────────────────────── */
    .page-body {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 24px;
    }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e5e7eb;
    }
    .card-divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 16px 0;
    }

    /* ── Form ────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    input[type="number"] {
      width: 100%;
      padding: 9px 12px;
      padding-right: 44px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1f2937;
      background: #ffffff;
      transition: border-color 0.15s, box-shadow 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-wrap { position: relative; }
    .unit-badge {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #9ca3af;
      pointer-events: none;
      font-weight: 500;
    }

    /* ── Submit ──────────────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .btn-primary:hover { background: #1d4ed8; }

    /* ── Result ──────────────────────────────────────────── */
    .result-box {
      margin-top: 20px;
      padding: 16px 20px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
    }
    .result-label  { font-size: 13px; color: #3b82f6; font-weight: 500; margin-bottom: 4px; }
    .result-value  { font-size: 28px; font-weight: 700; color: #1e40af; }
    .result-unit   { font-size: 15px; font-weight: 400; color: #3b82f6; margin-left: 4px; }
    .result-note   { font-size: 12px; color: #6b7280; margin-top: 6px; }

    /* ── Info banner ─────────────────────────────────────── */
    .info-banner {
      background: #f5f3ff;
      border: 1px solid #c4b5fd;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      color: #4c1d95;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    /* ── Resources row ───────────────────────────────────── */
    .resources-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 560px) {
      .resources-row { grid-template-columns: 1fr; }
    }
    .resource-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px 24px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { createApp, ref, computed } from 'vue'
    import {
      GkHint,
      GkTour,
      GkSidebarOverlay,
      GkFormulaBlock,
      GkDocButton,
      GkVideoPanel,
      GkHelpPanel,
    } from '../../dist/vue.mjs'

    // ── Hint content ──────────────────────────────────────────────────────────

    const hints = {
      mass: {
        title: 'Масса состава (брутто)',
        description: 'Суммарная масса вагонов с грузом без учёта локомотива.',
        range: '100 – 10 000',
        unit: 'т',
        norm: 'ГОСТ 22235-2010',
      },
      velocity: {
        title: 'Начальная скорость',
        description: 'Скорость поезда в момент начала торможения. '
                   + 'Для экстренного торможения принимается максимальная скорость участка.',
        range: '0 – 200',
        unit: 'км/ч',
        norm: 'ПТЭ 2022, приложение 2',
      },
      brake: {
        title: 'Расчётный тормозной коэффициент',
        description: 'Отношение суммарной расчётной силы нажатия тормозных колодок к весу состава.',
        range: '0.05 – 1.0',
        unit: 'б/р',
        norm: 'ПТЭ 2022, п. 3.2',
      },
      gradient: {
        title: 'Уклон пути',
        description: 'Продольный уклон в промилле. Положительное — подъём, отрицательное — спуск. '
                   + 'Спуск увеличивает тормозной путь.',
        range: '−20 … +20',
        unit: '‰',
        norm: 'СП 119.13330.2017',
      },
    }

    // ── Tour steps ────────────────────────────────────────────────────────────

    const tourSteps = [
      {
        target: '#vd-group-mass',
        title: 'Шаг 1 — Масса состава',
        content: 'Введите полную массу вагонов без локомотива. '
               + 'Наведите курсор на иконку «?» чтобы увидеть диапазон и норматив.',
        placement: 'bottom',
      },
      {
        target: '#vd-group-brake',
        title: 'Шаг 2 — Тормозной коэффициент',
        content: 'Ключевой параметр расчёта. '
               + 'Определяется по тормозной документации состава.',
        placement: 'bottom',
      },
      {
        target: '#vd-btn-calculate',
        title: 'Шаг 3 — Запуск расчёта',
        content: 'Нажмите кнопку для вычисления тормозного пути. '
               + 'Откройте «Методику» для просмотра полной формулы.',
        placement: 'top',
      },
    ]

    // ── Sidebar sections ──────────────────────────────────────────────────────

    const sidebarSections = [
      {
        type: 'text',
        title: 'Назначение',
        content: 'Расчёт тормозного пути при экстренном торможении по методике ПТЭ 2022, приложение 2.',
      },
      {
        type: 'formula',
        title: 'Расчётная формула',
        formulaOptions: {
          mode: 'html',
          html: '<i>S</i> = <i>v</i><sub>0</sub><sup>2</sup> / (254 &sdot; (<i>&phi;</i> + <i>i</i>/1000))',
          variables: [
            { symbol: 'S',   description: 'Тормозной путь',              unit: 'м' },
            { symbol: 'v₀',  description: 'Начальная скорость',          unit: 'км/ч' },
            { symbol: 'φ',   description: 'Тормозной коэффициент',       unit: 'б/р' },
            { symbol: 'i',   description: 'Уклон (+подъём, −спуск)',     unit: '‰' },
            { symbol: '254', description: 'Константа перевода единиц',   unit: '' },
          ],
          source: 'ПТЭ 2022, приложение 2, таблица П2.1',
        },
      },
      {
        type: 'steps',
        title: 'Порядок расчёта',
        collapsible: true,
        steps: [
          { label: 'Определить массу состава',           description: 'По перевозочным документам' },
          { label: 'Установить начальную скорость',       description: 'Максимально допустимая для участка' },
          { label: 'Определить тормозной коэффициент',   description: 'Из тормозной документации состава' },
          { label: 'Учесть уклон пути',                  description: 'Спуск берётся со знаком «−»' },
          { label: 'Подставить значения в формулу' },
          { label: 'Сравнить с нормативом ПТЭ 2022' },
        ],
      },
      {
        type: 'checklist',
        title: 'Проверка перед расчётом',
        collapsible: true,
        items: [
          { id: 'c1', label: 'Масса состава подтверждена документально' },
          { id: 'c2', label: 'Скорость не превышает допустимую на участке' },
          { id: 'c3', label: 'Тормозной коэффициент проверен по документации' },
          { id: 'c4', label: 'Уклон взят из актуального профиля пути' },
        ],
      },
      {
        type: 'doc',
        title: 'Нормативные документы',
        docOptions: {
          label: 'Нормативные документы',
          docs: [
            { label: 'ПТЭ 2022, приложение 2', url: '#', fileType: 'pdf', size: '1.2 МБ' },
            { label: 'ГОСТ 22235-2010',        url: '#', fileType: 'pdf', size: '0.8 МБ' },
          ],
        },
      },
      {
        type: 'video',
        title: 'Учебное видео',
        videoOptions: {
          mode: 'link',
          source: {
            url: '#',
            title: 'Методика расчёта тормозного пути',
            duration: '8:45',
          },
          linkText: 'Смотреть видеоинструкцию',
        },
      },
    ]

    // ── App ───────────────────────────────────────────────────────────────────

    const App = {
      components: {
        GkHint,
        GkTour,
        GkSidebarOverlay,
        GkFormulaBlock,
        GkDocButton,
        GkVideoPanel,
        GkHelpPanel,
      },

      setup() {
        const tourRunning = ref(false)
        const sidebarOpen = ref(false)
        const result      = ref(null)
        const helpPanelRef = ref(null)

        // Visibility state for HelpPanel-managed items
        const itemVisible = ref({
          tour:    true,
          sidebar: true,
          formula: true,
          docs:    true,
          video:   true,
          hints:   true,
        })

        const helpItems = [
          {
            id: 'vd-tour',
            type: 'tour',
            label: 'Обучающий тур',
            description: 'Пошаговое знакомство с расчётом',
            action: () => { tourRunning.value = true },
          },
          {
            id: 'vd-sidebar',
            type: 'sidebar',
            label: 'Методические материалы',
            description: 'Формула, порядок расчёта, чек-лист, видео',
            action: () => { sidebarOpen.value = true },
          },
          {
            id: 'vd-hints',
            type: 'hint',
            label: 'Подсказки к полям',
            description: 'Контекстные подсказки при наведении на «?»',
            action: () => {},
          },
          {
            id: 'vd-formula',
            type: 'custom',
            label: 'Блок расчётной формулы',
            description: 'Формула с легендой переменных',
            action: () => document.getElementById('vd-formula-card')?.scrollIntoView({ behavior: 'smooth' }),
          },
          {
            id: 'vd-docs',
            type: 'doc',
            label: 'Нормативные документы',
            description: 'ПТЭ 2022, ГОСТ 22235-2010, СП 119',
            action: () => document.getElementById('vd-doc-card')?.scrollIntoView({ behavior: 'smooth' }),
          },
          {
            id: 'vd-video',
            type: 'video',
            label: 'Видеоинструкция',
            description: 'Методика расчёта тормозного пути',
            action: () => document.getElementById('vd-video-card')?.scrollIntoView({ behavior: 'smooth' }),
          },
        ]

        function onItemToggle(id, enabled) {
          const map = {
            'vd-tour':    'tour',
            'vd-sidebar': 'sidebar',
            'vd-hints':   'hints',
            'vd-formula': 'formula',
            'vd-docs':    'docs',
            'vd-video':   'video',
          }
          const key = map[id]
          if (key) itemVisible.value[key] = enabled
          // Also close sidebar if it was disabled
          if (id === 'vd-sidebar' && !enabled) sidebarOpen.value = false
        }

        function calculate(e) {
          e.preventDefault()
          const form = e.target
          const v0       = parseFloat(form.velocity.value) || 0
          const phi      = parseFloat(form.brake.value)    || 0
          const gradient = parseFloat(form.gradient.value) || 0
          const eff = phi + gradient / 1000
          if (eff <= 0) { alert('Сумма тормозного коэффициента и уклона должна быть > 0.'); return }
          result.value = { s: (v0 * v0) / (254 * eff), v0, phi, gradient }
        }

        return {
          tourRunning, sidebarOpen, result, helpPanelRef,
          itemVisible, helpItems, hints, tourSteps, sidebarSections,
          onItemToggle, calculate,
        }
      },

      template: `
        <div>
          <!-- ── Orchestrated components ─────────────────────────────── -->

          <GkTour
            :steps="tourSteps"
            :run="tourRunning && itemVisible.tour"
            :spotlight-padding="10"
            :overlay-opacity="0.6"
            @complete="tourRunning = false"
            @skip="tourRunning = false"
          />

          <GkSidebarOverlay
            :open="sidebarOpen && itemVisible.sidebar"
            :sections="sidebarSections"
            title="Методические материалы"
            side="left"
            :width="340"
            :show-toggle-button="itemVisible.sidebar"
            toggle-button-label="Методика"
            :backdrop="false"
            @close="sidebarOpen = false"
            @open="sidebarOpen = true"
          />

          <GkHelpPanel
            ref="helpPanelRef"
            :items="helpItems"
            position="bottom-right"
            label="Помощь"
            storage-key="gk-vue-demo"
            @item-toggle="onItemToggle"
          />

          <!-- ── Header ────────────────────────────────────────────── -->

          <header class="page-header">
            <div>
              <h1>Расчёт тормозного пути</h1>
              <p>guide-kit / vue demo</p>
            </div>
            <div class="header-actions">
              <button
                class="btn-secondary"
                :disabled="!itemVisible.sidebar"
                @click="sidebarOpen = true"
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
                Методика
              </button>
              <button
                class="btn-secondary"
                :disabled="!itemVisible.tour"
                @click="tourRunning = true"
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
                  <line x1="4" y1="22" x2="4" y2="15"/>
                </svg>
                Начать тур
              </button>
            </div>
          </header>

          <!-- ── Main ──────────────────────────────────────────────── -->

          <main class="page-body">

            <div class="info-banner">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>
                Управляйте компонентами помощи через кнопку <strong>?</strong> (справа внизу).
                Включайте и выключайте подсказки, тур и методику независимо.
              </span>
            </div>

            <!-- ── Form card ────────────────────────────────────── -->
            <div class="card">
              <div class="card-title">Исходные данные</div>

              <form @submit="calculate">
                <div class="form-grid">

                  <div class="form-group" id="vd-group-mass">
                    <GkHint v-if="itemVisible.hints" :content="hints.mass" placement="bottom">
                      <label for="vd-mass">Масса состава</label>
                    </GkHint>
                    <label v-else for="vd-mass">Масса состава</label>
                    <div class="input-wrap">
                      <input type="number" id="vd-mass" name="mass"
                             value="3000" min="100" max="10000" step="50" />
                      <span class="unit-badge">т</span>
                    </div>
                  </div>

                  <div class="form-group" id="vd-group-velocity">
                    <GkHint v-if="itemVisible.hints" :content="hints.velocity" placement="bottom">
                      <label for="vd-velocity">Начальная скорость</label>
                    </GkHint>
                    <label v-else for="vd-velocity">Начальная скорость</label>
                    <div class="input-wrap">
                      <input type="number" id="vd-velocity" name="velocity"
                             value="80" min="0" max="200" step="5" />
                      <span class="unit-badge">км/ч</span>
                    </div>
                  </div>

                  <div class="form-group" id="vd-group-brake">
                    <GkHint v-if="itemVisible.hints" :content="hints.brake" placement="bottom">
                      <label for="vd-brake">Тормозной коэффициент</label>
                    </GkHint>
                    <label v-else for="vd-brake">Тормозной коэффициент</label>
                    <div class="input-wrap">
                      <input type="number" id="vd-brake" name="brake"
                             value="0.33" min="0.05" max="1.0" step="0.01" />
                      <span class="unit-badge">б/р</span>
                    </div>
                  </div>

                  <div class="form-group">
                    <GkHint v-if="itemVisible.hints" :content="hints.gradient" placement="bottom">
                      <label for="vd-gradient">Уклон пути</label>
                    </GkHint>
                    <label v-else for="vd-gradient">Уклон пути</label>
                    <div class="input-wrap">
                      <input type="number" id="vd-gradient" name="gradient"
                             value="0" min="-20" max="20" step="1" />
                      <span class="unit-badge">‰</span>
                    </div>
                  </div>

                  <div class="form-group full" style="margin-top:6px">
                    <button type="submit" class="btn-primary" id="vd-btn-calculate">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                      </svg>
                      Рассчитать тормозной путь
                    </button>
                  </div>

                </div>

                <div v-if="result" class="result-box">
                  <div class="result-label">Расчётный тормозной путь</div>
                  <div>
                    <span class="result-value">{{ result.s.toFixed(1) }}</span>
                    <span class="result-unit">м</span>
                  </div>
                  <div class="result-note">
                    v₀ = {{ result.v0 }} км/ч,  φ = {{ result.phi }},  уклон = {{ result.gradient }} ‰
                    — по формуле ПТЭ 2022
                  </div>
                </div>
              </form>
            </div>

            <!-- ── FormulaBlock card ──────────────────────────────── -->
            <div v-if="itemVisible.formula" class="card" id="vd-formula-card">
              <div class="card-title">Расчётная формула</div>
              <GkFormulaBlock
                mode="html"
                html="<i>S</i> = <i>v</i><sub>0</sub><sup>2</sup> / (254 &sdot; (<i>&phi;</i> + <i>i</i> / 1000))"
                :variables="[
                  { symbol: 'S',   description: 'Тормозной путь',                  unit: 'м' },
                  { symbol: 'v₀',  description: 'Начальная скорость',              unit: 'км/ч' },
                  { symbol: 'φ',   description: 'Тормозной коэффициент',           unit: 'б/р' },
                  { symbol: 'i',   description: 'Уклон пути (+подъём, −спуск)',    unit: '‰' },
                ]"
                source="ПТЭ 2022, приложение 2"
              />
            </div>

            <!-- ── DocButton + VideoPanel row ────────────────────── -->
            <div class="resources-row">
              <div v-if="itemVisible.docs" class="resource-card" id="vd-doc-card">
                <div class="card-title">Нормативные документы</div>
                <GkDocButton
                  label="Нормативные документы"
                  :docs="[
                    { label: 'ПТЭ 2022, приложение 2', url: '#', fileType: 'pdf', size: '1.2 МБ' },
                    { label: 'ГОСТ 22235-2010',        url: '#', fileType: 'pdf', size: '0.8 МБ' },
                    { label: 'СП 119.13330.2017',      url: '#', fileType: 'pdf', size: '2.1 МБ' },
                  ]"
                />
              </div>
              <div v-if="itemVisible.video" class="resource-card" id="vd-video-card">
                <div class="card-title">Обучающее видео</div>
